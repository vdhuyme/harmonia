name: harmonia

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-harmonia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harmonia}
      POSTGRES_DB: ${POSTGRES_DB:-harmonia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-harmonia}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-harmonia}:${POSTGRES_PASSWORD:-harmonia}@postgres:5432/${POSTGRES_DB:-harmonia}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-spotify-client-id}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:3000/auth/spotify/callback}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-youtube-client-id}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI:-http://localhost:3000/auth/youtube/callback}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-youtube-api-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-harmonia}:${POSTGRES_PASSWORD:-harmonia}@postgres:5432/${POSTGRES_DB:-harmonia}
      REDIS_URL: redis://redis:6379
      WORKER_CHECK_INTERVAL_SECS: ${WORKER_CHECK_INTERVAL_SECS:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
